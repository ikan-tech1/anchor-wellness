version: "3.8"

services:
  voice:
    build: .
    ports:
      - "8765:8765"
    environment:
      - WHISPER_MODEL=base
      - PIPER_VOICE=en_US-lessac-medium
    volumes:
      - whisper-cache:/root/.cache/whisper
      - piper-models:/models
    restart: unless-stopped

volumes:
  whisper-cache:
  piper-models:
